<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Agent - Atharva Gai</title>
    <!-- Use Inter font for modern futuristic look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 27, 43, 0.7);
            --border-color: #2d3753;
            --accent-color: #00f0ff;
            --primary-color: #7000ff;
            --text-color: #e2e8f0;
            --glow: 0 0 15px rgba(0, 240, 255, 0.4);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; /* No scrolling allowed */
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Panel styles */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            z-index: 10;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 800;
            background: -webkit-linear-gradient(0deg, var(--accent-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header .author {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        main {
            display: grid;
            grid-template-columns: 25% 35% 40%;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 100px); /* Subtract header and padding */
            box-sizing: border-box;
        }

        .panel-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: var(--glow);
        }

        textarea {
            resize: none;
            flex-grow: 1;
            min-height: 150px;
        }

        button {
            background: linear-gradient(90deg, var(--primary-color), #4000ff);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            box-shadow: 0 0 20px var(--primary-color);
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Graph representation block */
        .graph-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            position: relative;
            gap: 30px;
        }

        .node {
            background: #1e293b;
            border: 2px solid var(--border-color);
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            width: 60%;
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .node.active {
            border-color: var(--accent-color);
            background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow);
            transform: scale(1.05);
        }
        
        .node.done {
            border-color: #10b981;
            color: #10b981;
        }

        .edge {
            width: 2px;
            height: 30px;
            background: var(--border-color);
            position: relative;
            z-index: 1;
        }

        /* Terminal Window */
        .terminal {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.5;
            color: #10b981; /* Default log color */
            border: 1px solid var(--border-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        .terminal::-webkit-scrollbar {
            width: 8px;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 5px;
            word-break: break-all;
        }
        .log-entry.system { color: #94a3b8; }
        .log-entry.error { color: #f43f5e; }
        .log-entry.success { color: var(--accent-color); }
        
        .blinking-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--accent-color);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <header>
        <h1>AI Coding Agent</h1>
        <div class="author">By Atharva Gai</div>
    </header>

    <main>
        <!-- LEFT: Inputs -->
        <div class="panel-container glass-panel">
            <h2>Configuration</h2>
            <div class="input-group">
                <label for="apiKey">Groq API Key</label>
                <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
            </div>
            <div class="input-group" style="flex-grow: 1; display:flex; flex-direction:column;">
                <label for="prompt">Project Prompt</label>
                <textarea id="prompt" placeholder="Describe the application you want to build..."></textarea>
            </div>
            <button id="buildBtn" onclick="startBuild()">Initialize Build</button>
        </div>

        <!-- MIDDLE: Live Graph -->
        <div class="panel-container glass-panel">
            <h2>Backend Flow Process</h2>
            <div class="graph-container">
                <div class="node" id="node-START">START</div>
                <div class="edge"></div>
                <div class="node" id="node-planner">Planner Agent</div>
                <div class="edge"></div>
                <div class="node" id="node-architect">Architect Agent</div>
                <div class="edge"></div>
                <div class="node" id="node-coder">Coder Agent (Loop)</div>
                <div class="edge"></div>
                <div class="node" id="node-END">END</div>
            </div>
        </div>

        <!-- RIGHT: Output Window -->
        <div class="panel-container glass-panel">
            <h2>Live Output Terminal</h2>
            <div class="terminal" id="terminal">
                <div class="log-entry system">System initialized. Waiting for task...</div>
            </div>
        </div>
    </main>

    <script>
        let ws;
        const terminal = document.getElementById('terminal');
        const buildBtn = document.getElementById('buildBtn');

        function appendLog(message, type = 'system') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = `> ${message}`;
            terminal.appendChild(div);
            // Autoscroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setActiveNode(nodeId) {
            // Reset all nodes
            document.querySelectorAll('.node').forEach(node => {
                node.classList.remove('active');
            });
            const nodeElem = document.getElementById(`node-${nodeId}`);
            if (nodeElem) {
                nodeElem.classList.add('active');
            }
        }
        
        function setAllDone() {
            document.querySelectorAll('.node').forEach(node => {
                node.classList.remove('active');
                node.classList.add('done');
            });
        }

        function startBuild() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('prompt').value.trim();

            if (!apiKey || !prompt) {
                appendLog('API Key and Project Prompt are required.', 'error');
                return;
            }

            // Reset UI
            terminal.innerHTML = '';
            document.querySelectorAll('.node').forEach(node => node.classList.remove('done', 'active'));
            buildBtn.disabled = true;
            buildBtn.innerText = "Building...";

            appendLog('Connecting to backend WS...', 'system');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                appendLog('Connected. Sending configuration...', 'success');
                setActiveNode('START');
                ws.send(JSON.stringify({
                    api_key: apiKey,
                    prompt: prompt
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'log') {
                    if (data.message.toLowerCase().includes('error')) {
                        appendLog(data.message, 'error');
                    } else if (data.message.toLowerCase().includes('complete') || data.message.toLowerCase().includes('done')) {
                        appendLog(data.message, 'success');
                    } else {
                        appendLog(data.message, 'system');
                    }
                } else if (data.type === 'graph') {
                    setActiveNode(data.currentNode);
                    if (data.currentNode === 'END') {
                        setAllDone();
                    }
                }
            };

            ws.onclose = () => {
                if (document.getElementById('node-END').classList.contains('active') || document.querySelectorAll('.node.done').length > 0) {
                     appendLog('Connection closed. Simulation complete.', 'success');
                } else {
                     appendLog('Connection closed unexpectedly.', 'error');
                }
                buildBtn.disabled = false;
                buildBtn.innerText = "Initialize Build";
            };

            ws.onerror = (error) => {
                appendLog(`WebSocket Errored`, 'error');
            };
        }
    </script>
</body>
</html>
